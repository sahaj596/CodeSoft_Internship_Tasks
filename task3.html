<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .calculator{
            background:white;
            padding:20px;
            border-radius:10px;
            width:320px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .display{
            width:100%;
            height:60px;
            margin-bottom:15px;
            text-align:right;
            font-size:28px;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
        }

        button{
            padding:18px;
            font-size:18px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            background:#e5e5e5;
        }

        button:hover{
            background:#d4d4d4;
        }

        .operator{
            background:#7c3aed;
            color:white;
        }

        .operator:hover{
            background:#5b21b6;
        }

        .equal{
            background:#16a34a;
            color:white;
        }

        .equal:hover{
            background:#15803d;
        }

        .clear{
            background:#dc2626;
            color:white;
        }

        .clear:hover{
            background:#b91c1c;
        }

    </style>

</head>

<body>

    <div class="calculator">

        <input type="text" class="display" id="display" readonly>

        <div class="buttons">

            <button class="clear" onclick="clearDisplay()">
                C
            </button>

            <button onclick="deleteLast()">
                ⌫
            </button>

            <button class="operator" onclick="appendValue('%')">
                %
            </button>

            <button class="operator" onclick="appendValue('/')">
                /
            </button>

            <button onclick="appendValue('7')">
                7
            </button>

            <button onclick="appendValue('8')">
                8
            </button>

            <button onclick="appendValue('9')">
                9
            </button>

            <button class="operator" onclick="appendValue('*')">
                ×
            </button>

            <button onclick="appendValue('4')">
                4
            </button>

            <button onclick="appendValue('5')">
                5
            </button>

            <button onclick="appendValue('6')">
                6
            </button>

            <button class="operator" onclick="appendValue('-')">
                -
            </button>

            <button onclick="appendValue('1')">
                1
            </button>

            <button onclick="appendValue('2')">
                2
            </button>

            <button onclick="appendValue('3')">
                3
            </button>

            <button class="operator" onclick="appendValue('+')">
                +
            </button>

            <button onclick="appendValue('0')">
                0
            </button>

            <button onclick="appendValue('.')">
                .
            </button>

            <button class="equal" onclick="calculate()">
                =
            </button>

        </div>

    </div>

    <script>

        let display=document.getElementById("display");

        function appendValue(value){

            display.value += value;

        }

        function clearDisplay(){

            display.value = "";

        }

        function deleteLast(){

            display.value = display.value.slice(0,-1);

        }

        function calculate(){

            try{

                display.value = eval(display.value);

            }

            catch{

                display.value = "Error";

            }

        }

    </script>

</body>

</html>
